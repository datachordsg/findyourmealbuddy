    <script>
        const nodeLookup = {"Daniel": {"x": 0.19021434551279867, "y": 0.959381435305431, "z": 0.4631606276958515, "size": 16.0}, "Dr. Alvinia": {"x": -0.3508914472920733, "y": -0.6293870841565556, "z": -0.7600225451869052, "size": 16.0}, "Lawrence Pang": {"x": -1.0, "y": 0.49216482307712545, "z": -0.01742330027181266, "size": 16.0}, "DT": {"x": 0.24376300911343637, "y": -0.6926908181763449, "z": 0.8576617309461115, "size": 16.0}, "Jacky": {"x": 0.9169140926658382, "y": -0.12946835604965595, "z": -0.5433765131832452, "size": 16.0}};
        const nodeLabels = ["Daniel", "Dr. Alvinia", "Lawrence Pang", "DT", "Jacky"];
        const DEFAULT_EYE = {"x": 1.7, "y": 1.7, "z": 1.3};
        const DEFAULT_UP = {"x": 0, "y": 0, "z": 1};
        const CLICK_ZOOM_OFFSET = {"x": 0.38, "y": 0.38, "z": 0.28};

        const plot = document.getElementById("networkPlot");
        const datalist = document.getElementById("nameList");
        const searchInput = document.getElementById("nameSearch");
        const status = document.getElementById("status");

        // Trace indices:
        // 0 = edge trace
        // 1 = edge hover trace
        // 2 = real node trace
        // 3 = simulated white node trace
        // 4 = highlight trace
        const nodeTraceIndex = 2;
        const highlightTraceIndex = 4;

        nodeLabels.slice().sort((a, b) => a.localeCompare(b)).forEach(label => {
            const opt = document.createElement("option");
            opt.value = label;
            datalist.appendChild(opt);
        });

        function findMatchingLabel(query) {
            if (!query) return null;
            const q = query.trim().toLowerCase();

            for (const label of nodeLabels) {
                if (label.toLowerCase() === q) return label;
            }
            for (const label of nodeLabels) {
                if (label.toLowerCase().includes(q)) return label;
            }
            return null;
        }

        function highlightByLabel(label) {
            const pt = nodeLookup[label];
            if (!pt) {
                status.textContent = "Name not found.";
                return;
            }

            Plotly.restyle(plot, {
                x: [[pt.x]],
                y: [[pt.y]],
                z: [[pt.z]],
                text: [[label]],
                textposition: [["top center"]],
                marker: [{
                    size: [Math.max(38, pt.size * 2.2)],
                    color: ["rgba(255,0,0,0.95)"],
                    line: {
                        width: 8,
                        color: "rgba(255,255,255,1)"
                    },
                    symbol: "circle"
                }],
                textfont: [{
                    size: 20,
                    color: "#ffffff"
                }]
            }, [highlightTraceIndex]);

            searchInput.value = label;
        }

        function focusOnNode() {
            const raw = searchInput.value;
            const matched = findMatchingLabel(raw);

            if (!matched) {
                status.textContent = "Name not found.";
                return;
            }

            highlightByLabel(matched);
            status.textContent = "Highlighted: " + matched;
        }

        function zoomToCoordinates(x, y, z) {
            Plotly.relayout(plot, {
                "scene.camera.eye": {
                    x: x + CLICK_ZOOM_OFFSET.x,
                    y: y + CLICK_ZOOM_OFFSET.y,
                    z: z + CLICK_ZOOM_OFFSET.z
                },
                "scene.camera.center": {
                    x: 0,
                    y: 0,
                    z: 0
                },
                "scene.camera.up": DEFAULT_UP
            });
        }

        function resetView() {
            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]],
                text: [[""]],
                marker: [{
                    size: [0],
                    color: ["rgba(0,0,0,0)"],
                    line: {
                        width: 0,
                        color: "rgba(0,0,0,0)"
                    }
                }]
            }, [highlightTraceIndex]);

            Plotly.relayout(plot, {
                "scene.camera.eye": DEFAULT_EYE,
                "scene.camera.center": {x: 0, y: 0, z: 0},
                "scene.camera.up": DEFAULT_UP
            });

            status.textContent = "View reset.";
        }

        window.addEventListener("load", function() {
            setTimeout(function() {
                Plotly.Plots.resize(plot);
            }, 350);
        });

        window.addEventListener("resize", function() {
            Plotly.Plots.resize(plot);
        });

        document.getElementById("focusBtn").addEventListener("click", focusOnNode);
        document.getElementById("resetBtn").addEventListener("click", resetView);

        searchInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                focusOnNode();
            }
        });

        plot.on("plotly_click", function(data) {
            if (!data || !data.points || data.points.length === 0) return;

            const pt = data.points[0];
            if (pt.curveNumber !== nodeTraceIndex) return; // only real colored nodes

            const clickedLabel = pt.text;
            const x = pt.x;
            const y = pt.y;
            const z = pt.z;

            highlightByLabel(clickedLabel);
            zoomToCoordinates(x, y, z);
            status.textContent = "Zoomed to: " + clickedLabel;
        });
    </script>
