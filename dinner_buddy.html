<html>
<head>
    <meta charset="utf-8">

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: white;
            font-family: Arial, sans-serif;
            background: radial-gradient(ellipse at bottom, #05091a 0%, #000000 100%);
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
        }

        body {
            position: relative;
            overscroll-behavior: none;
            touch-action: none;
        }

        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 1000;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            max-width: none;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
        }

        #nameSearch {
            padding: 10px 12px;
            font-size: 16px;
            min-width: 180px;
            flex: 1 1 180px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #222;
            color: white;
            outline: none;
        }

        #focusBtn, #resetBtn {
            padding: 10px 14px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        #focusBtn {
            background: #2d6cdf;
        }

        #resetBtn {
            background: #666;
        }

        #status {
            font-size: 13px;
            color: #ccc;
            white-space: nowrap;
        }

        #plotWrapper {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            overscroll-behavior: none;
        }

        #networkPlot {
            width: 100vw !important;
            height: 100vh !important;
            touch-action: none;
            overscroll-behavior: none;
        }

        #networkPlot .plot-container,
        #networkPlot .svg-container,
        #networkPlot .main-svg {
            width: 100vw !important;
            height: 100vh !important;
            touch-action: none !important;
        }

        #zoomControls {
            position: absolute;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            z-index: 1000;
            width: min(88vw, 520px);
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #zoomLabel {
            font-size: 14px;
            color: #ddd;
            white-space: nowrap;
        }

        #zoomSlider {
            flex: 1 1 auto;
            width: 100%;
            accent-color: #2d6cdf;
        }

        #zoomValue {
            min-width: 58px;
            text-align: right;
            font-size: 13px;
            color: #ddd;
        }

        @media (max-width: 768px) {
            #controls {
                top: 8px;
                left: 8px;
                right: 8px;
                padding: 8px 10px;
                gap: 6px;
            }

            #nameSearch {
                font-size: 16px;
                min-width: 140px;
            }

            #focusBtn, #resetBtn {
                font-size: 14px;
                padding: 9px 12px;
            }

            #status {
                font-size: 12px;
                white-space: normal;
            }

            #zoomControls {
                width: min(92vw, 560px);
                bottom: 10px;
                padding: 10px 12px;
            }

            #zoomLabel {
                font-size: 13px;
            }

            #zoomValue {
                font-size: 12px;
                min-width: 52px;
            }
        }
    </style>

":{"visible":false},"zaxis":{"visible":false},"camera":{"eye":{"x":1.7,"y":1.7,"z":1.3},"center":{"x":0,"y":0,"z":0},"up":{"x":0,"y":0,"z":1}},"bgcolor":"rgba(0,0,0,0)","aspectmode":"data","dragmode":"orbit"},"margin":{"l":0,"r":0,"t":42,"b":0},"title":{"text":"Dinner Buddy Network (3D Interactive, Threshold = 0.9)"},"autosize":true,"showlegend":false},                        {"responsive": true, "displaylogo": false, "scrollZoom": true, "doubleClick": "reset", "showTips": false, "modeBarButtonsToRemove": ["select2d", "lasso2d", "autoScale2d", "resetScale2d", "toggleSpikelines"]}                    )                };            </script>        </div>

    <div id="zoomControls">
        <span id="zoomLabel">Zoom</span>
        <input
            id="zoomSlider"
            type="range"
            min="0.2"
            max="3.0"
            step="0.01"
            value="1.00"
        />
        <span id="zoomValue">1.00×</span>
    </div>

    <script>
        const nodeLookup = {"Daniel": {"x": 0.08411375538367377, "y": 1.0, "z": 0.24363578442618614, "size": 22.0}, "Dr. Alvinia": {"x": 0.5390652524111949, "y": -0.8119348640823183, "z": -0.07397686342044202, "size": 16.0}, "Lawrence Pang": {"x": -0.5789908619427785, "y": 0.5762941052583355, "z": -0.4864114073845274, "size": 22.0}, "DT": {"x": 0.36415175211615913, "y": -0.5662721412138363, "z": 0.9279691056393247, "size": 16.0}, "Jacky": {"x": 0.9479553322634076, "y": -0.14115626345315302, "z": -0.3720872767979743, "size": 16.0}, "William Lovell": {"x": -0.6348557553588805, "y": -0.2558657316364636, "z": 0.6995471236981978, "size": 16.0}, "Brandon Ng": {"x": -0.1099880682932911, "y": -0.6934776950880613, "z": -0.47493384722506876, "size": 22.0}, "Lucy": {"x": -0.911321820616014, "y": -0.3436742381811178, "z": -0.16608712636438971, "size": 16.0}, "Whisky": {"x": 0.12386669800401469, "y": 0.9328929665282205, "z": 0.17522212305300594, "size": 22.0}, "Norie Oathoudt": {"x": -0.49748424123453494, "y": 0.5499727562485076, "z": -0.5492315601669511, "size": 22.0}, "Eunice": {"x": -0.12837558507708735, "y": -0.7866562918908402, "z": -0.5522123103368487, "size": 22.0}, "Sukma": {"x": 0.8018635423441364, "y": 0.5398773975107272, "z": 0.6285662548794876, "size": 16.0}};
        const nodeLabels = ["Daniel", "Dr. Alvinia", "Lawrence Pang", "DT", "Jacky", "William Lovell", "Brandon Ng", "Lucy", "Whisky", "Norie Oathoudt", "Eunice", "Sukma"];
        const connectedEdgesLookup = {"Daniel": [{"u": "Daniel", "v": "Whisky", "x0": 0.08411375538367377, "y0": 1.0, "z0": 0.24363578442618614, "x1": 0.12386669800401469, "y1": 0.9328929665282205, "z1": 0.17522212305300594, "weight": 0.9811341793278141}], "Dr. Alvinia": [], "Lawrence Pang": [{"u": "Lawrence Pang", "v": "Norie Oathoudt", "x0": -0.5789908619427785, "y0": 0.5762941052583355, "z0": -0.4864114073845274, "x1": -0.49748424123453494, "y1": 0.5499727562485076, "z1": -0.5492315601669511, "weight": 0.9135088823286596}], "DT": [], "Jacky": [], "William Lovell": [], "Brandon Ng": [{"u": "Brandon Ng", "v": "Eunice", "x0": -0.1099880682932911, "y0": -0.6934776950880613, "z0": -0.47493384722506876, "x1": -0.12837558507708735, "y1": -0.7866562918908402, "z1": -0.5522123103368487, "weight": 0.9070553292251571}], "Lucy": [], "Whisky": [{"u": "Daniel", "v": "Whisky", "x0": 0.08411375538367377, "y0": 1.0, "z0": 0.24363578442618614, "x1": 0.12386669800401469, "y1": 0.9328929665282205, "z1": 0.17522212305300594, "weight": 0.9811341793278141}], "Norie Oathoudt": [{"u": "Lawrence Pang", "v": "Norie Oathoudt", "x0": -0.5789908619427785, "y0": 0.5762941052583355, "z0": -0.4864114073845274, "x1": -0.49748424123453494, "y1": 0.5499727562485076, "z1": -0.5492315601669511, "weight": 0.9135088823286596}], "Eunice": [{"u": "Brandon Ng", "v": "Eunice", "x0": -0.1099880682932911, "y0": -0.6934776950880613, "z0": -0.47493384722506876, "x1": -0.12837558507708735, "y1": -0.7866562918908402, "z1": -0.5522123103368487, "weight": 0.9070553292251571}], "Sukma": []};
        const DEFAULT_EYE = {"x": 1.7, "y": 1.7, "z": 1.3};
        const DEFAULT_UP = {"x": 0, "y": 0, "z": 1};
        const CLICK_ZOOM_OFFSET = {"x": 0.38, "y": 0.38, "z": 0.28};

        const plot = document.getElementById("networkPlot");
        const datalist = document.getElementById("nameList");
        const searchInput = document.getElementById("nameSearch");
        const status = document.getElementById("status");
        const zoomSlider = document.getElementById("zoomSlider");
        const zoomValue = document.getElementById("zoomValue");

        // Trace indices:
        // 0 = edge trace
        // 1 = edge hover trace
        // 2 = highlighted connected-edge trace
        // 3 = real node trace
        // 4 = simulated white node trace
        // 5 = highlight node trace
        // 6+ = svm line traces
        const connectedEdgeTraceIndex = 2;
        const nodeTraceIndex = 3;
        const highlightTraceIndex = 5;

        let sliderLock = false;

        function eyeMagnitude(eye) {
            return Math.sqrt(
                Math.pow(eye.x || 0, 2) +
                Math.pow(eye.y || 0, 2) +
                Math.pow(eye.z || 0, 2)
            );
        }

        function cloneEye(eye) {
            return {
                x: Number(eye.x || 0),
                y: Number(eye.y || 0),
                z: Number(eye.z || 0)
            };
        }

        function cloneCenter(center) {
            return {
                x: Number((center && center.x) || 0),
                y: Number((center && center.y) || 0),
                z: Number((center && center.z) || 0)
            };
        }

        function cloneUp(up) {
            return {
                x: Number((up && up.x) || DEFAULT_UP.x),
                y: Number((up && up.y) || DEFAULT_UP.y),
                z: Number((up && up.z) || DEFAULT_UP.z)
            };
        }

        function normalizeEye(eye) {
            const mag = eyeMagnitude(eye);
            if (mag === 0) return cloneEye(DEFAULT_EYE);
            return {
                x: eye.x / mag,
                y: eye.y / mag,
                z: eye.z / mag
            };
        }

        function currentCamera() {
            const cam = (plot.layout && plot.layout.scene && plot.layout.scene.camera)
                ? plot.layout.scene.camera
                : null;

            return {
                eye: cam && cam.eye ? cloneEye(cam.eye) : cloneEye(DEFAULT_EYE),
                center: cam && cam.center ? cloneCenter(cam.center) : {x: 0, y: 0, z: 0},
                up: cam && cam.up ? cloneUp(cam.up) : cloneUp(DEFAULT_UP)
            };
        }

        function setZoomText(scale) {
            zoomValue.textContent = Number(scale).toFixed(2) + "×";
        }

        function resetSliderDisplay() {
            sliderLock = true;
            zoomSlider.value = "1.00";
            setZoomText(1.00);
            setTimeout(() => {
                sliderLock = false;
            }, 0);
        }

        function applyRelativeZoom(factor) {
            const cam = currentCamera();
            const currentMag = eyeMagnitude(cam.eye);
            const dir = normalizeEye(cam.eye);

            let newMag = currentMag / factor;

            const MIN_MAG = 0.15;
            const MAX_MAG = 20.0;
            newMag = Math.max(MIN_MAG, Math.min(MAX_MAG, newMag));

            const newEye = {
                x: dir.x * newMag,
                y: dir.y * newMag,
                z: dir.z * newMag
            };

            Plotly.relayout(plot, {
                "scene.camera.eye": newEye,
                "scene.camera.center": cam.center,
                "scene.camera.up": cam.up,
                "scene.dragmode": "orbit"
            });
        }

        function setCameraAndKeepOrientation(cameraObj) {
            Plotly.relayout(plot, {
                "scene.camera.eye": cameraObj.eye,
                "scene.camera.center": cameraObj.center,
                "scene.camera.up": cameraObj.up,
                "scene.dragmode": "orbit"
            });
        }

        function highlightConnectedEdges(label) {
            const edges = connectedEdgesLookup[label] || [];

            if (edges.length === 0) {
                Plotly.restyle(plot, {
                    x: [[null]],
                    y: [[null]],
                    z: [[null]]
                }, [connectedEdgeTraceIndex]);
                return;
            }

            const xs = [];
            const ys = [];
            const zs = [];

            for (const e of edges) {
                xs.push(e.x0, e.x1, null);
                ys.push(e.y0, e.y1, null);
                zs.push(e.z0, e.z1, null);
            }

            Plotly.restyle(plot, {
                x: [xs],
                y: [ys],
                z: [zs]
            }, [connectedEdgeTraceIndex]);
        }

        nodeLabels.slice().sort((a, b) => a.localeCompare(b)).forEach(label => {
            const opt = document.createElement("option");
            opt.value = label;
            datalist.appendChild(opt);
        });

        function findMatchingLabel(query) {
            if (!query) return null;
            const q = query.trim().toLowerCase();

            for (const label of nodeLabels) {
                if (label.toLowerCase() === q) return label;
            }
            for (const label of nodeLabels) {
                if (label.toLowerCase().includes(q)) return label;
            }
            return null;
        }

        function highlightByLabel(label) {
            const pt = nodeLookup[label];
            if (!pt) {
                status.textContent = "Name not found.";
                return;
            }

            Plotly.restyle(plot, {
                x: [[pt.x]],
                y: [[pt.y]],
                z: [[pt.z]],
                text: [[label]],
                textposition: [["top center"]],
                marker: [{
                    size: [Math.max(38, pt.size * 2.2)],
                    color: ["rgba(255,0,0,0.95)"],
                    line: {
                        width: 8,
                        color: "rgba(255,255,255,1)"
                    },
                    symbol: "circle"
                }],
                textfont: [{
                    size: 20,
                    color: "#ffffff"
                }]
            }, [highlightTraceIndex]);

            searchInput.value = label;
        }

        function focusOnNode() {
            const raw = searchInput.value;
            const matched = findMatchingLabel(raw);

            if (!matched) {
                status.textContent = "Name not found.";
                return;
            }

            highlightByLabel(matched);
            highlightConnectedEdges(matched);
            status.textContent = "Highlighted: " + matched;
        }

        function zoomToCoordinates(x, y, z) {
            const cam = currentCamera();

            setCameraAndKeepOrientation({
                eye: {
                    x: x + CLICK_ZOOM_OFFSET.x,
                    y: y + CLICK_ZOOM_OFFSET.y,
                    z: z + CLICK_ZOOM_OFFSET.z
                },
                center: cam.center,
                up: cam.up
            });

            resetSliderDisplay();
        }

        function resetView() {
            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]],
                text: [[""]],
                marker: [{
                    size: [0],
                    color: ["rgba(0,0,0,0)"],
                    line: {
                        width: 0,
                        color: "rgba(0,0,0,0)"
                    }
                }]
            }, [highlightTraceIndex]);

            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]]
            }, [connectedEdgeTraceIndex]);

            setCameraAndKeepOrientation({
                eye: cloneEye(DEFAULT_EYE),
                center: {x: 0, y: 0, z: 0},
                up: cloneUp(DEFAULT_UP)
            });

            resetSliderDisplay();
            status.textContent = "View reset.";
        }

        function preventPageGestures() {
            document.addEventListener("gesturestart", function(e) {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener("gesturechange", function(e) {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener("gestureend", function(e) {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener("touchmove", function(e) {
                if (e.touches && e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });
        }

        window.addEventListener("load", function() {
            preventPageGestures();

            Plotly.relayout(plot, {
                "scene.dragmode": "orbit"
            });

            setTimeout(function() {
                Plotly.Plots.resize(plot);
                resetSliderDisplay();
            }, 350);
        });

        window.addEventListener("resize", function() {
            Plotly.Plots.resize(plot);
        });

        document.getElementById("focusBtn").addEventListener("click", focusOnNode);
        document.getElementById("resetBtn").addEventListener("click", resetView);

        searchInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                focusOnNode();
            }
        });

        zoomSlider.addEventListener("input", function() {
            if (sliderLock) return;

            const factor = parseFloat(zoomSlider.value);
            setZoomText(factor);

            if (Math.abs(factor - 1.0) < 1e-6) return;

            applyRelativeZoom(factor);
            resetSliderDisplay();
        });

        plot.on("plotly_click", function(data) {
            if (!data || !data.points || data.points.length === 0) return;

            const pt = data.points[0];
            if (pt.curveNumber !== nodeTraceIndex) return;

            const clickedLabel = pt.text;
            const x = pt.x;
            const y = pt.y;
            const z = pt.z;

            highlightByLabel(clickedLabel);
            highlightConnectedEdges(clickedLabel);
            zoomToCoordinates(x, y, z);
            status.textContent = "Zoomed to: " + clickedLabel;
        });
    </script>
