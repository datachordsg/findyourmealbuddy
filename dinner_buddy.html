        const nodeNames = ["A1001", "A1002", "A1003", "A1004", "A1005", "A1006", "A1007", "A1008", "A1009", "A1010", "A1011", "A1012", "A1013", "A1014", "A1015", "A1016", "A1017", "A1018", "A1019", "A1020", "A1021", "A1022", "A1023", "A1024", "A1025", "A1026", "A1027", "A1028", "A1029", "A1030", "A1031", "A1032", "A1033", "A1034", "A1035"];
        const DEFAULT_EYE = {"x": 1.7, "y": 1.7, "z": 1.3};
        const DEFAULT_UP = {"x": 0, "y": 0, "z": 1};
        const CLICK_ZOOM_OFFSET = {"x": 0.38, "y": 0.38, "z": 0.28};

        const plot = document.getElementById("networkPlot");
        const datalist = document.getElementById("nameList");
        const searchInput = document.getElementById("nameSearch");
        const status = document.getElementById("status");

        // Trace indices:
        // 0 = edge trace
        // 1 = edge hover trace
        // 2 = real node trace
        // 3 = simulated white node trace
        // 4 = highlight trace
        const nodeTraceIndex = 2;
        const highlightTraceIndex = 4;

        nodeNames.slice().sort((a, b) => a.localeCompare(b)).forEach(name => {
            const opt = document.createElement("option");
            opt.value = name;
            datalist.appendChild(opt);
        });

        function findMatchingName(query) {
            if (!query) return null;
            const q = query.trim().toLowerCase();

            for (const name of nodeNames) {
                if (name.toLowerCase() === q) return name;
            }
            for (const name of nodeNames) {
                if (name.toLowerCase().includes(q)) return name;
            }
            return null;
        }

        function highlightByName(name) {
            const pt = nodeLookup[name];
            if (!pt) {
                status.textContent = "Name not found.";
                return;
            }

            Plotly.restyle(plot, {
                x: [[pt.x]],
                y: [[pt.y]],
                z: [[pt.z]],
                text: [[name]],
                textposition: [["top center"]],
                marker: [{
                    size: [Math.max(38, pt.size * 2.2)],
                    color: ["rgba(255,0,0,0.95)"],
                    line: {
                        width: 8,
                        color: "rgba(255,255,255,1)"
                    },
                    symbol: "circle"
                }],
                textfont: [{
                    size: 20,
                    color: "#ffffff"
                }]
            }, [highlightTraceIndex]);

            searchInput.value = name;
        }

        function focusOnNode() {
            const raw = searchInput.value;
            const matched = findMatchingName(raw);

            if (!matched) {
                status.textContent = "Name not found.";
                return;
            }

            highlightByName(matched);
            status.textContent = "Highlighted: " + matched;
        }

        function zoomToCoordinates(x, y, z) {
            Plotly.relayout(plot, {
                "scene.camera.eye": {
                    x: x + CLICK_ZOOM_OFFSET.x,
                    y: y + CLICK_ZOOM_OFFSET.y,
                    z: z + CLICK_ZOOM_OFFSET.z
                },
                "scene.camera.center": {
                    x: 0,
                    y: 0,
                    z: 0
                },
                "scene.camera.up": DEFAULT_UP
            });
        }

        function resetView() {
            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]],
                text: [[""]],
                marker: [{
                    size: [0],
                    color: ["rgba(0,0,0,0)"],
                    line: {
                        width: 0,
                        color: "rgba(0,0,0,0)"
                    }
                }]
            }, [highlightTraceIndex]);

            Plotly.relayout(plot, {
                "scene.camera.eye": DEFAULT_EYE,
                "scene.camera.center": {x: 0, y: 0, z: 0},
                "scene.camera.up": DEFAULT_UP
            });

            status.textContent = "View reset.";
        }

        window.addEventListener("load", function() {
            setTimeout(function() {
                Plotly.Plots.resize(plot);
            }, 350);
        });

        window.addEventListener("resize", function() {
            Plotly.Plots.resize(plot);
        });

        document.getElementById("focusBtn").addEventListener("click", focusOnNode);
        document.getElementById("resetBtn").addEventListener("click", resetView);

        searchInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                focusOnNode();
            }
        });

        plot.on("plotly_click", function(data) {
            if (!data || !data.points || data.points.length === 0) return;

            const pt = data.points[0];
            if (pt.curveNumber !== nodeTraceIndex) return; // only real colored nodes

            const clickedName = pt.text;
            const x = pt.x;
            const y = pt.y;
            const z = pt.z;

            highlightByName(clickedName);
            zoomToCoordinates(x, y, z);
            status.textContent = "Zoomed to: " + clickedName;
        });
    </script>
