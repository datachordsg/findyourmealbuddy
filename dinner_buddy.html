    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;

        }

        body {
            position: relative;
            overscroll-behavior: none;
            touch-action: none;
        }

        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 1000;
            padding: 10px 14px;

            border-radius: 10px;

            align-items: center;
            flex-wrap: wrap;
            max-width: none;

        }

            font-size: 16px;
            min-width: 180px;
            flex: 1 1 180px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #222;
            color: white;
            outline: none;
        }

        #focusBtn, #resetBtn {
            padding: 10px 14px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        #focusBtn {
            background: #2d6cdf;
        }

        #resetBtn {
            background: #666;
        }

        #status {
            font-size: 13px;
            color: #ccc;
            white-space: nowrap;
        }

        #plotWrapper {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            overscroll-behavior: none;
        }

            width: 100vw !important;
            height: 100vh !important;
            touch-action: none;
            overscroll-behavior: none;
        }

        #networkPlot .plot-container,
        #networkPlot .svg-container,
        #networkPlot .main-svg {
            width: 100vw !important;
            height: 100vh !important;
            touch-action: none !important;
        }

        #zoomControls {
            position: absolute;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            z-index: 1000;
            width: min(88vw, 520px);
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #zoomLabel {
            font-size: 14px;
            color: #ddd;
            white-space: nowrap;
        }

        #zoomSlider {
            flex: 1 1 auto;
            width: 100%;
            accent-color: #2d6cdf;
        }

        #zoomValue {
            min-width: 58px;
            text-align: right;
            font-size: 13px;
            color: #ddd;
        }

        @media (max-width: 768px) {

                left: 8px;
                right: 8px;
                padding: 8px 10px;
                gap: 6px;
            }

                font-size: 16px;
                min-width: 140px;
            }

            #focusBtn, #resetBtn {
                font-size: 14px;
                padding: 9px 12px;
            }

            #status {
                font-size: 12px;
                white-space: normal;
            }

            #zoomControls {
                width: min(92vw, 560px);
                bottom: 10px;
                padding: 10px 12px;
            }

            #zoomLabel {
                font-size: 13px;
            }

            #zoomValue {
                font-size: 12px;
                min-width: 52px;
            }
        }

        function eyeMagnitude(eye) {
            return Math.sqrt(
                Math.pow(eye.x || 0, 2) +
                Math.pow(eye.y || 0, 2) +
                Math.pow(eye.z || 0, 2)
            );
        }

        const DEFAULT_EYE_MAG = eyeMagnitude(DEFAULT_EYE);

        function cloneEye(eye) {
            return {
                x: Number(eye.x || 0),
                y: Number(eye.y || 0),
                z: Number(eye.z || 0)
            };
        }

        function cloneCenter(center) {
            return {
                x: Number((center && center.x) || 0),
                y: Number((center && center.y) || 0),
                z: Number((center && center.z) || 0)
            };
        }

        function cloneUp(up) {
            return {
                x: Number((up && up.x) || DEFAULT_UP.x),
                y: Number((up && up.y) || DEFAULT_UP.y),
                z: Number((up && up.z) || DEFAULT_UP.z)
            };
        }

        function normalizeEye(eye) {
            const mag = eyeMagnitude(eye);
            if (mag === 0) return cloneEye(DEFAULT_EYE);
            return {
                x: eye.x / mag,
                y: eye.y / mag,
                z: eye.z / mag
            };
        }

        function currentCamera() {
            const cam = (plot.layout && plot.layout.scene && plot.layout.scene.camera)
                ? plot.layout.scene.camera
                : null;

            return {
                eye: cam && cam.eye ? cloneEye(cam.eye) : cloneEye(DEFAULT_EYE),
                center: cam && cam.center ? cloneCenter(cam.center) : {x: 0, y: 0, z: 0},
                up: cam && cam.up ? cloneUp(cam.up) : cloneUp(DEFAULT_UP)
            };
        }

        function sliderFromEye(eye) {
            return eyeMagnitude(eye) / DEFAULT_EYE_MAG;
        }

            const minV = parseFloat(zoomSlider.min);
            const maxV = parseFloat(zoomSlider.max);
            const clipped = Math.max(minV, Math.min(maxV, scale));
            zoomSlider.value = clipped.toFixed(2);
            setZoomText(clipped);
        }

        function applyZoomScale(scale) {
            const cam = currentCamera();
            const dir = normalizeEye(cam.eye);
            const newMag = DEFAULT_EYE_MAG * scale;

            const newEye = {
                x: dir.x * newMag,
                y: dir.y * newMag,
                z: dir.z * newMag
            };

            Plotly.relayout(plot, {
                "scene.camera.eye": newEye,
                "scene.camera.center": cam.center,
                "scene.camera.up": cam.up,
                "scene.dragmode": "orbit"
            });

            setZoomText(scale);
        }

        function setCameraAndSyncSlider(cameraObj) {
            Plotly.relayout(plot, {
                "scene.camera.eye": cameraObj.eye,
                "scene.camera.center": cameraObj.center,
                "scene.camera.up": cameraObj.up,
                "scene.dragmode": "orbit"
            }).then(() => {
                updateSliderFromCurrentCamera();
            });
        }

        nodeLabels.slice().sort((a, b) => a.localeCompare(b)).forEach(label => {
            const opt = document.createElement("option");
            opt.value = label;
            datalist.appendChild(opt);
        });

        function findMatchingLabel(query) {
            if (!query) return null;
            const q = query.trim().toLowerCase();

            for (const label of nodeLabels) {
                if (label.toLowerCase() === q) return label;
            }
            for (const label of nodeLabels) {
                if (label.toLowerCase().includes(q)) return label;
            }
            return null;
        }

        function highlightByLabel(label) {
            const pt = nodeLookup[label];
            if (!pt) {
                status.textContent = "Name not found.";
                return;
            }

            Plotly.restyle(plot, {
                x: [[pt.x]],
                y: [[pt.y]],
                z: [[pt.z]],
                text: [[label]],
                textposition: [["top center"]],
                marker: [{
                    size: [Math.max(38, pt.size * 2.2)],
                    color: ["rgba(255,0,0,0.95)"],
                    line: {
                        width: 8,
                        color: "rgba(255,255,255,1)"
                    },
                    symbol: "circle"
                }],
                textfont: [{
                    size: 20,
                    color: "#ffffff"
                }]
            }, [highlightTraceIndex]);

            searchInput.value = label;
        }

        function focusOnNode() {
            const raw = searchInput.value;
            const matched = findMatchingLabel(raw);

            if (!matched) {
                status.textContent = "Name not found.";
                return;
            }

            highlightByLabel(matched);
            status.textContent = "Highlighted: " + matched;
        }

        function zoomToCoordinates(x, y, z) {
            const cam = currentCamera();

            setCameraAndSyncSlider({
                eye: {
                    x: x + CLICK_ZOOM_OFFSET.x,
                    y: y + CLICK_ZOOM_OFFSET.y,
                    z: z + CLICK_ZOOM_OFFSET.z
                },
                center: cam.center,
                up: cam.up
            });
        }

        function resetView() {
            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]],
                text: [[""]],
                marker: [{
                    size: [0],
                    color: ["rgba(0,0,0,0)"],
                    line: {
                        width: 0,
                        color: "rgba(0,0,0,0)"
                    }
                }]
            }, [highlightTraceIndex]);

            setCameraAndSyncSlider({
                eye: cloneEye(DEFAULT_EYE),
                center: {x: 0, y: 0, z: 0},
                up: cloneUp(DEFAULT_UP)
            });

            status.textContent = "View reset.";
        }

        function preventPageGestures() {
            document.addEventListener("gesturestart", function(e) {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener("gesturechange", function(e) {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener("gestureend", function(e) {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener("touchmove", function(e) {
                if (e.touches && e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });
        }

        window.addEventListener("load", function() {
            preventPageGestures();

            Plotly.relayout(plot, {
                "scene.dragmode": "orbit"
            });

            setTimeout(function() {
                Plotly.Plots.resize(plot);
                updateSliderFromCurrentCamera();
            }, 350);
        });

        window.addEventListener("resize", function() {
            Plotly.Plots.resize(plot);
        });

        document.getElementById("focusBtn").addEventListener("click", focusOnNode);
        document.getElementById("resetBtn").addEventListener("click", resetView);

        searchInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                focusOnNode();
            }
        });

        zoomSlider.addEventListener("input", function() {
            const scale = parseFloat(zoomSlider.value);
            applyZoomScale(scale);
        });

        plot.on("plotly_click", function(data) {
            if (!data || !data.points || data.points.length === 0) return;

            const pt = data.points[0];
            if (pt.curveNumber !== nodeTraceIndex) return;

            const clickedLabel = pt.text;
            const x = pt.x;
            const y = pt.y;
            const z = pt.z;

            highlightByLabel(clickedLabel);
            zoomToCoordinates(x, y, z);
            status.textContent = "Zoomed to: " + clickedLabel;
        });

        plot.on("plotly_relayout", function() {
            updateSliderFromCurrentCamera();
        });
    </script>
</body>
</html>
