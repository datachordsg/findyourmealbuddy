            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;

        }

        #focusBtn { background: #2d6cdf; }

        #status {
            font-size: 13px;
            color: #ccc;
            white-space: nowrap;
        }

        .toggleWrap {

            align-items: center;
            gap: 12px;

            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
        }

        .toggleWrap label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #eee;
            cursor: pointer;
            user-select: none;
        }

        .toggleWrap input[type="checkbox"] {
            transform: scale(1.1);
            cursor: pointer;
        }

        #plotWrapper {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            overscroll-behavior: none;
        }

        #networkPlot {
            width: 100vw !important;
            height: 100vh !important;
            touch-action: none;
            overscroll-behavior: none;
        }

        #networkPlot .plot-container,
        #networkPlot .svg-container,
        #networkPlot .main-svg {
            width: 100vw !important;
            height: 100vh !important;
            touch-action: none !important;
        }

        #zoomControls {

            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            z-index: 1000;
            width: min(88vw, 520px);
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.72);

            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            gap: 12px;

            color: #ddd;
            white-space: nowrap;
        }

        #zoomSlider {
            flex: 1 1 auto;
            width: 100%;
            accent-color: #2d6cdf;
        }

        #zoomValue {
            min-width: 58px;
            text-align: right;
            font-size: 13px;
            color: #ddd;
        }

        @media (max-width: 768px) {

                left: 8px;
                right: 8px;
                padding: 8px 10px;

                min-width: 140px;

                font-size: 13px;
            }

                font-size: 12px;
                min-width: 52px;
            }

81947754, "y0": 0.14245293577616758, "z0": 0.25226338609597415, "x1": 0.6830426549418731, "y1": 0.18178603513147548, "z1": 0.27887244713322185, "weight": 0.9795781799574335}, {"u": "Ying", "v": "Sunnie", "x0": 0.6822367957243475, "y0": 0.14691525340193215, "z0": 0.3389930045321586, "x1": 0.6830426549418731, "y1": 0.18178603513147548, "z1": 0.27887244713322185, "weight": 0.9655225621580186}], "Xu YiFei": [{"u": "JIANG QIONGYUE", "v": "Xu YiFei", "x0": 0.21531587818290954, "y0": 0.02509487835635103, "z0": 0.8629405410098046, "x1": 0.19255350639640398, "y1": 0.06021856894920941, "z1": 0.9316738359021152, "weight": 0.9179069558991941}], "xuxun": [{"u": "William Lovell", "v": "xuxun", "x0": -0.46939766386357434, "y0": 0.6049120811834501, "z0": 0.05332098757248373, "x1": -0.5278573164145557, "y1": 0.6229594317187434, "z1": 0.019912990806167014, "weight": 0.9545767050320929}, {"u": "Yu", "v": "xuxun", "x0": -0.5021772965738552, "y0": 0.5756279749715488, "z0": 0.005887712787961404, "x1": -0.5278573164145557, "y1": 0.6229594317187434, "z1": 0.019912990806167014, "weight": 0.9896146639958967}, {"u": "YANG CHUHUI", "v": "xuxun", "x0": -0.48114611897834103, "y0": 0.6251867256795007, "z0": -0.008885073762190106, "x1": -0.5278573164145557, "y1": 0.6229594317187434, "z1": 0.019912990806167014, "weight": 0.9382681879637624}], "Vernice": [{"u": "YYY", "v": "Vernice", "x0": 0.7248648329961661, "y0": 0.17626942654110284, "z0": 0.21032253732471407, "x1": 0.7413881784367737, "y1": 0.1983083445061159, "z1": 0.1463237285769333, "weight": 0.9453608533389236}, {"u": "Wan", "v": "Vernice", "x0": 0.6839069993505567, "y0": 0.1823040898972625, "z0": 0.195673303802141, "x1": 0.7413881784367737, "y1": 0.1983083445061159, "z1": 0.1463237285769333, "weight": 0.9225293196700948}]};
        const DEFAULT_EYE = {"x": 1.7, "y": 1.7, "z": 1.3};
        const DEFAULT_UP = {"x": 0, "y": 0, "z": 1};
        const SHOW_GMM_BY_DEFAULT = true;
        const SHOW_SVM_BY_DEFAULT = false;

        const plot = document.getElementById("networkPlot");
        const datalist = document.getElementById("nameList");
        const searchInput = document.getElementById("nameSearch");
        const status = document.getElementById("status");
        const zoomSlider = document.getElementById("zoomSlider");
        const zoomValue = document.getElementById("zoomValue");
        const toggleGMM = document.getElementById("toggleGMM");
        const toggleSVM = document.getElementById("toggleSVM");

        // Trace indices:
        // 0 = edge trace
        // 1 = edge hover trace
        // 2 = highlighted connected-edge trace
        // 3 = real node trace
        // 4 = simulated white node trace (GMM)
        // 5 = highlight node trace
        // 6+ = svm line traces
        const connectedEdgeTraceIndex = 2;
        const gmmTraceIndex = 4;
        const highlightTraceIndex = 5;
        const svmStartTraceIndex = 6;

        let sliderLock = false;

        function eyeMagnitude(eye) {
            return Math.sqrt(
                Math.pow(eye.x || 0, 2) +
                Math.pow(eye.y || 0, 2) +
                Math.pow(eye.z || 0, 2)
            );
        }

        function cloneEye(eye) {
            return {
                x: Number(eye.x || 0),
                y: Number(eye.y || 0),
                z: Number(eye.z || 0)
            };
        }

        function cloneCenter(center) {
            return {
                x: Number((center && center.x) || 0),
                y: Number((center && center.y) || 0),
                z: Number((center && center.z) || 0)
            };
        }

        function cloneUp(up) {
            return {
                x: Number((up && up.x) || DEFAULT_UP.x),
                y: Number((up && up.y) || DEFAULT_UP.y),
                z: Number((up && up.z) || DEFAULT_UP.z)
            };
        }

        function normalizeEye(eye) {
            const mag = eyeMagnitude(eye);
            if (mag === 0) return cloneEye(DEFAULT_EYE);
            return {
                x: eye.x / mag,
                y: eye.y / mag,
                z: eye.z / mag
            };
        }

        function currentCamera() {
            const cam = (plot.layout && plot.layout.scene && plot.layout.scene.camera)
                ? plot.layout.scene.camera
                : null;

            return {
                eye: cam && cam.eye ? cloneEye(cam.eye) : cloneEye(DEFAULT_EYE),
                center: cam && cam.center ? cloneCenter(cam.center) : {x: 0, y: 0, z: 0},
                up: cam && cam.up ? cloneUp(cam.up) : cloneUp(DEFAULT_UP)
            };
        }

        function setZoomText(scale) {
            zoomValue.textContent = Number(scale).toFixed(2) + "×";
        }

        function resetSliderDisplay() {
            sliderLock = true;
            zoomSlider.value = "1.00";
            setZoomText(1.00);
            setTimeout(() => {
                sliderLock = false;
            }, 0);
        }

        function applyRelativeZoom(factor) {
            const cam = currentCamera();
            const currentMag = eyeMagnitude(cam.eye);
            const dir = normalizeEye(cam.eye);

            let newMag = currentMag / factor;
            const MIN_MAG = 0.15;
            const MAX_MAG = 20.0;
            newMag = Math.max(MIN_MAG, Math.min(MAX_MAG, newMag));

            const newEye = {
                x: dir.x * newMag,
                y: dir.y * newMag,
                z: dir.z * newMag
            };

            Plotly.relayout(plot, {
                "scene.camera.eye": newEye,
                "scene.camera.center": cam.center,
                "scene.camera.up": cam.up,
                "scene.dragmode": "orbit"
            });
        }

        function setCameraAndKeepOrientation(cameraObj) {
            Plotly.relayout(plot, {
                "scene.camera.eye": cameraObj.eye,
                "scene.camera.center": cameraObj.center,
                "scene.camera.up": cameraObj.up,
                "scene.dragmode": "orbit"
            });
        }

        function highlightConnectedEdges(label) {
            const edges = connectedEdgesLookup[label] || [];

            if (edges.length === 0) {
                Plotly.restyle(plot, {
                    x: [[null]],
                    y: [[null]],
                    z: [[null]]
                }, [connectedEdgeTraceIndex]);
                return;
            }

            const xs = [];
            const ys = [];
            const zs = [];

            for (const e of edges) {
                xs.push(e.x0, e.x1, null);
                ys.push(e.y0, e.y1, null);
                zs.push(e.z0, e.z1, null);
            }

            Plotly.restyle(plot, {
                x: [xs],
                y: [ys],
                z: [zs]
            }, [connectedEdgeTraceIndex]);
        }

        function setTraceVisibility(traceIndex, visibleFlag) {
            Plotly.restyle(plot, {
                visible: visibleFlag ? true : "legendonly"
            }, [traceIndex]);
        }

        function setSVMVisibility(visibleFlag) {
            const totalTraces = plot.data.length;
            const svmIndices = [];
            for (let i = svmStartTraceIndex; i < totalTraces; i++) {
                svmIndices.push(i);
            }
            if (svmIndices.length > 0) {
                Plotly.restyle(plot, {
                    visible: visibleFlag ? true : "legendonly"
                }, svmIndices);
            }
        }

        nodeLabels.slice().sort((a, b) => a.localeCompare(b)).forEach(label => {
            const opt = document.createElement("option");
            opt.value = label;
            datalist.appendChild(opt);
        });

        function findMatchingLabel(query) {
            if (!query) return null;
            const q = query.trim().toLowerCase();

            for (const label of nodeLabels) {
                if (label.toLowerCase() === q) return label;
            }
            for (const label of nodeLabels) {
                if (label.toLowerCase().includes(q)) return label;
            }
            return null;
        }

        function highlightByLabel(label) {
            const pt = nodeLookup[label];
            if (!pt) {
                status.textContent = "Name not found.";
                return;
            }

            Plotly.restyle(plot, {
                x: [[pt.x]],
                y: [[pt.y]],
                z: [[pt.z]],
                text: [[label]],
                textposition: [["top center"]],
                marker: [{
                    size: [Math.max(38, pt.size * 2.2)],
                    color: ["rgba(255,0,0,0.95)"],
                    line: {
                        width: 8,
                        color: "rgba(255,255,255,1)"
                    },
                    symbol: "circle"
                }],
                textfont: [{
                    size: 20,
                    color: "#ffffff"
                }]
            }, [highlightTraceIndex]);

            searchInput.value = label;
        }

        function focusOnNode() {
            const raw = searchInput.value;
            const matched = findMatchingLabel(raw);

            if (!matched) {
                status.textContent = "Name not found.";
                return;
            }

            highlightByLabel(matched);
            highlightConnectedEdges(matched);
            status.textContent = "Highlighted: " + matched;
        }

        function resetView() {
            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]],
                text: [[""]],
                marker: [{
                    size: [0],
                    color: ["rgba(0,0,0,0)"],
                    line: {
                        width: 0,
                        color: "rgba(0,0,0,0)"
                    }
                }]
            }, [highlightTraceIndex]);

            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]]
            }, [connectedEdgeTraceIndex]);

            setCameraAndKeepOrientation({
                eye: cloneEye(DEFAULT_EYE),
                center: {x: 0, y: 0, z: 0},
                up: cloneUp(DEFAULT_UP)
            });

            resetSliderDisplay();
            status.textContent = "View reset.";
        }

        window.addEventListener("load", function() {
            toggleGMM.checked = SHOW_GMM_BY_DEFAULT;
            toggleSVM.checked = SHOW_SVM_BY_DEFAULT;

            Plotly.relayout(plot, {
                "scene.dragmode": "orbit"
            });

            setTraceVisibility(gmmTraceIndex, toggleGMM.checked);
            setSVMVisibility(toggleSVM.checked);

            setTimeout(function() {
                Plotly.Plots.resize(plot);
                resetSliderDisplay();
            }, 350);
        });

        window.addEventListener("resize", function() {
            Plotly.Plots.resize(plot);
        });

        document.getElementById("focusBtn").addEventListener("click", focusOnNode);
        document.getElementById("resetBtn").addEventListener("click", resetView);

        searchInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                focusOnNode();
            }
        });

        zoomSlider.addEventListener("input", function() {
            if (sliderLock) return;

            const factor = parseFloat(zoomSlider.value);
            setZoomText(factor);

            if (Math.abs(factor - 1.0) < 1e-6) return;

            applyRelativeZoom(factor);
            resetSliderDisplay();
        });

        toggleGMM.addEventListener("change", function() {
            setTraceVisibility(gmmTraceIndex, this.checked);
            status.textContent = this.checked ? "GMM shown." : "GMM hidden.";
        });

        toggleSVM.addEventListener("change", function() {
            setSVMVisibility(this.checked);
            status.textContent = this.checked ? "SVM boundaries shown." : "SVM boundaries hidden.";
        });

        // Intentionally no plot click handler.
    </script>
