<html>
<head>
    <meta charset="utf-8">

    <title>Dinner Buddy Network</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: white;
            font-family: Arial, sans-serif;
            background: radial-gradient(ellipse at bottom, #05091a 0%, #000000 100%);
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
        }

        body {
            position: relative;
            overscroll-behavior: none;
            touch-action: none;
        }

        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 1000;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            max-width: none;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
        }

        #nameSearch {
            padding: 10px 12px;
            font-size: 16px;
            min-width: 180px;
            flex: 1 1 180px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #222;
            color: white;
            outline: none;
        }

        #focusBtn, #resetBtn {
            padding: 10px 14px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        #focusBtn {
            background: #2d6cdf;
        }

        #resetBtn {
            background: #666;
        }

        #status {
            font-size: 13px;
            color: #ccc;
            white-space: nowrap;
        }

        #plotWrapper {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            overscroll-behavior: none;
        }

        #networkPlot {
            width: 100vw !important;
            height: 100vh !important;
            touch-action: none;
            overscroll-behavior: none;
        }

        #networkPlot .plot-container,
        #networkPlot .svg-container,
        #networkPlot .main-svg {
            width: 100vw !important;
            height: 100vh !important;
            touch-action: none !important;
        }

        #zoomControls {
            position: absolute;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            z-index: 1000;
            width: min(88vw, 520px);
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #zoomLabel {
            font-size: 14px;
            color: #ddd;
            white-space: nowrap;
        }

        #zoomSlider {
            flex: 1 1 auto;
            width: 100%;
            accent-color: #2d6cdf;
        }

        #zoomValue {
            min-width: 58px;
            text-align: right;
            font-size: 13px;
            color: #ddd;
        }

        @media (max-width: 768px) {
            #controls {
                top: 8px;
                left: 8px;
                right: 8px;
                padding: 8px 10px;
                gap: 6px;
            }

            #nameSearch {
                font-size: 16px;
                min-width: 140px;
            }

            #focusBtn, #resetBtn {
                font-size: 14px;
                padding: 9px 12px;
            }

            #status {
                font-size: 12px;
                white-space: normal;
            }

            #zoomControls {
                width: min(92vw, 560px);
                bottom: 10px;
                padding: 10px 12px;
            }

            #zoomLabel {
                font-size: 13px;
            }

            #zoomValue {
                font-size: 12px;
                min-width: 52px;
            }
        }
    </style>

        const connectedEdgesLookup = {"Daniel": [{"u": "Daniel", "v": "Whisky", "x0": 0.3299570469619377, "y0": 0.9832064818825543, "z0": 0.27484120932033124, "x1": 0.35076472872263287, "y1": 0.9037177346089367, "z1": 0.1833554650644761, "weight": 0.9438093156588081}], "Dr. Alvinia": [], "Lawrence Pang": [{"u": "Lawrence Pang", "v": "Norie Oathoudt", "x0": -0.5834298464548493, "y0": 0.5819913203473929, "z0": -0.5587082141676902, "x1": -0.49850751840191293, "y1": 0.5471469209784546, "z1": -0.6379240354459453, "weight": 0.9858414838341651}], "DT": [], "Jacky": [], "William Lovell": [], "Brandon Ng": [], "Lucy": [], "Whisky": [{"u": "Daniel", "v": "Whisky", "x0": 0.3299570469619377, "y0": 0.9832064818825543, "z0": 0.27484120932033124, "x1": 0.35076472872263287, "y1": 0.9037177346089367, "z1": 0.1833554650644761, "weight": 0.9438093156588081}], "Norie Oathoudt": [{"u": "Lawrence Pang", "v": "Norie Oathoudt", "x0": -0.5834298464548493, "y0": 0.5819913203473929, "z0": -0.5587082141676902, "x1": -0.49850751840191293, "y1": 0.5471469209784546, "z1": -0.6379240354459453, "weight": 0.9858414838341651}]};
        const DEFAULT_EYE = {"x": 1.7, "y": 1.7, "z": 1.3};
        const DEFAULT_UP = {"x": 0, "y": 0, "z": 1};
        const CLICK_ZOOM_OFFSET = {"x": 0.38, "y": 0.38, "z": 0.28};

        const plot = document.getElementById("networkPlot");
        const datalist = document.getElementById("nameList");
        const searchInput = document.getElementById("nameSearch");
        const status = document.getElementById("status");
        const zoomSlider = document.getElementById("zoomSlider");
        const zoomValue = document.getElementById("zoomValue");

        // Trace indices:
        // 0 = edge trace
        // 1 = edge hover trace
        // 2 = highlighted connected-edge trace
        // 3 = real node trace
        // 4 = simulated white node trace
        // 5 = highlight node trace
        // 6+ = svm line traces
        const connectedEdgeTraceIndex = 2;
        const nodeTraceIndex = 3;
        const highlightTraceIndex = 5;

        let sliderLock = false;

        function eyeMagnitude(eye) {
            return Math.sqrt(
                Math.pow(eye.x || 0, 2) +
                Math.pow(eye.y || 0, 2) +
                Math.pow(eye.z || 0, 2)
            );
        }

        function cloneEye(eye) {
            return {
                x: Number(eye.x || 0),
                y: Number(eye.y || 0),
                z: Number(eye.z || 0)
            };
        }

        function cloneCenter(center) {
            return {
                x: Number((center && center.x) || 0),
                y: Number((center && center.y) || 0),
                z: Number((center && center.z) || 0)
            };
        }

        function cloneUp(up) {
            return {
                x: Number((up && up.x) || DEFAULT_UP.x),
                y: Number((up && up.y) || DEFAULT_UP.y),
                z: Number((up && up.z) || DEFAULT_UP.z)
            };
        }

        function normalizeEye(eye) {
            const mag = eyeMagnitude(eye);
            if (mag === 0) return cloneEye(DEFAULT_EYE);
            return {
                x: eye.x / mag,
                y: eye.y / mag,
                z: eye.z / mag
            };
        }

        function currentCamera() {
            const cam = (plot.layout && plot.layout.scene && plot.layout.scene.camera)
                ? plot.layout.scene.camera
                : null;

            return {
                eye: cam && cam.eye ? cloneEye(cam.eye) : cloneEye(DEFAULT_EYE),
                center: cam && cam.center ? cloneCenter(cam.center) : {x: 0, y: 0, z: 0},
                up: cam && cam.up ? cloneUp(cam.up) : cloneUp(DEFAULT_UP)
            };
        }

        function setZoomText(scale) {
            zoomValue.textContent = Number(scale).toFixed(2) + "×";
        }

        function resetSliderDisplay() {
            sliderLock = true;
            zoomSlider.value = "1.00";
            setZoomText(1.00);
            setTimeout(() => {
                sliderLock = false;
            }, 0);
        }

        function applyRelativeZoom(factor) {
            const cam = currentCamera();
            const currentMag = eyeMagnitude(cam.eye);
            const dir = normalizeEye(cam.eye);

            let newMag = currentMag / factor;

            const MIN_MAG = 0.15;
            const MAX_MAG = 20.0;
            newMag = Math.max(MIN_MAG, Math.min(MAX_MAG, newMag));

            const newEye = {
                x: dir.x * newMag,
                y: dir.y * newMag,
                z: dir.z * newMag
            };

            Plotly.relayout(plot, {
                "scene.camera.eye": newEye,
                "scene.camera.center": cam.center,
                "scene.camera.up": cam.up,
                "scene.dragmode": "orbit"
            });
        }

        function setCameraAndKeepOrientation(cameraObj) {
            Plotly.relayout(plot, {
                "scene.camera.eye": cameraObj.eye,
                "scene.camera.center": cameraObj.center,
                "scene.camera.up": cameraObj.up,
                "scene.dragmode": "orbit"
            });
        }

        function highlightConnectedEdges(label) {
            const edges = connectedEdgesLookup[label] || [];

            if (edges.length === 0) {
                Plotly.restyle(plot, {
                    x: [[null]],
                    y: [[null]],
                    z: [[null]]
                }, [connectedEdgeTraceIndex]);
                return;
            }

            const xs = [];
            const ys = [];
            const zs = [];

            for (const e of edges) {
                xs.push(e.x0, e.x1, null);
                ys.push(e.y0, e.y1, null);
                zs.push(e.z0, e.z1, null);
            }

            Plotly.restyle(plot, {
                x: [xs],
                y: [ys],
                z: [zs]
            }, [connectedEdgeTraceIndex]);
        }

        nodeLabels.slice().sort((a, b) => a.localeCompare(b)).forEach(label => {
            const opt = document.createElement("option");
            opt.value = label;
            datalist.appendChild(opt);
        });

        function findMatchingLabel(query) {
            if (!query) return null;
            const q = query.trim().toLowerCase();

            for (const label of nodeLabels) {
                if (label.toLowerCase() === q) return label;
            }
            for (const label of nodeLabels) {
                if (label.toLowerCase().includes(q)) return label;
            }
            return null;
        }

        function highlightByLabel(label) {
            const pt = nodeLookup[label];
            if (!pt) {
                status.textContent = "Name not found.";
                return;
            }

            Plotly.restyle(plot, {
                x: [[pt.x]],
                y: [[pt.y]],
                z: [[pt.z]],
                text: [[label]],
                textposition: [["top center"]],
                marker: [{
                    size: [Math.max(38, pt.size * 2.2)],
                    color: ["rgba(255,0,0,0.95)"],
                    line: {
                        width: 8,
                        color: "rgba(255,255,255,1)"
                    },
                    symbol: "circle"
                }],
                textfont: [{
                    size: 20,
                    color: "#ffffff"
                }]
            }, [highlightTraceIndex]);

            searchInput.value = label;
        }

        function focusOnNode() {
            const raw = searchInput.value;
            const matched = findMatchingLabel(raw);

            if (!matched) {
                status.textContent = "Name not found.";
                return;
            }

            highlightByLabel(matched);
            highlightConnectedEdges(matched);
            status.textContent = "Highlighted: " + matched;
        }

        function zoomToCoordinates(x, y, z) {
            const cam = currentCamera();

            setCameraAndKeepOrientation({
                eye: {
                    x: x + CLICK_ZOOM_OFFSET.x,
                    y: y + CLICK_ZOOM_OFFSET.y,
                    z: z + CLICK_ZOOM_OFFSET.z
                },
                center: cam.center,
                up: cam.up
            });

            resetSliderDisplay();
        }

        function resetView() {
            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]],
                text: [[""]],
                marker: [{
                    size: [0],
                    color: ["rgba(0,0,0,0)"],
                    line: {
                        width: 0,
                        color: "rgba(0,0,0,0)"
                    }
                }]
            }, [highlightTraceIndex]);

            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]]
            }, [connectedEdgeTraceIndex]);

            setCameraAndKeepOrientation({
                eye: cloneEye(DEFAULT_EYE),
                center: {x: 0, y: 0, z: 0},
                up: cloneUp(DEFAULT_UP)
            });

            resetSliderDisplay();
            status.textContent = "View reset.";
        }

        function preventPageGestures() {
            document.addEventListener("gesturestart", function(e) {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener("gesturechange", function(e) {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener("gestureend", function(e) {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener("touchmove", function(e) {
                if (e.touches && e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });
        }

        window.addEventListener("load", function() {
            preventPageGestures();

            Plotly.relayout(plot, {
                "scene.dragmode": "orbit"
            });

            setTimeout(function() {
                Plotly.Plots.resize(plot);
                resetSliderDisplay();
            }, 350);
        });

        window.addEventListener("resize", function() {
            Plotly.Plots.resize(plot);
        });

        document.getElementById("focusBtn").addEventListener("click", focusOnNode);
        document.getElementById("resetBtn").addEventListener("click", resetView);

        searchInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                focusOnNode();
            }
        });

        zoomSlider.addEventListener("input", function() {
            if (sliderLock) return;

            const factor = parseFloat(zoomSlider.value);
            setZoomText(factor);

            if (Math.abs(factor - 1.0) < 1e-6) return;

            applyRelativeZoom(factor);
            resetSliderDisplay();
        });

        plot.on("plotly_click", function(data) {
            if (!data || !data.points || data.points.length === 0) return;

            const pt = data.points[0];
            if (pt.curveNumber !== nodeTraceIndex) return;

            const clickedLabel = pt.text;
            const x = pt.x;
            const y = pt.y;
            const z = pt.z;

            highlightByLabel(clickedLabel);
            highlightConnectedEdges(clickedLabel);
            zoomToCoordinates(x, y, z);
            status.textContent = "Zoomed to: " + clickedLabel;
        });
    </script>
</body>
</html>
